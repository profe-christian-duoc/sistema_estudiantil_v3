# Puerto del Gateway
server.port=9090

# Configuracion de EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Ruta para el Microservicio de Estudiantes
spring.cloud.gateway.server.webflux.routes[0].id=estudiantes
spring.cloud.gateway.server.webflux.routes[0].uri=lb://estudiantes-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/estudiantes/**
# Ruta para el Microservicio de Docentes
spring.cloud.gateway.server.webflux.routes[1].id=docentes
spring.cloud.gateway.server.webflux.routes[1].uri=lb://docentes-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/docentes/**
# Ruta para el Microservicio de Asignaturas
spring.cloud.gateway.server.webflux.routes[2].id=asignaturas
spring.cloud.gateway.server.webflux.routes[2].uri=lb://asignaturas-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/asignaturas/**
# Ruta para el Microservicio de Tutorias
spring.cloud.gateway.server.webflux.routes[3].id=tutorias
spring.cloud.gateway.server.webflux.routes[3].uri=lb://tutorias-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/tutorias/**
