server:
  port: 0

spring:
  application:
    name: docentes-service

  datasource:
    url: jdbc:mysql://localhost:3306/bd_docentes
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}